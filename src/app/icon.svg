<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Rect Background matching site new navy theme -->
  <rect width="512" height="512" rx="128" fill="#001228"/>

  <!-- Logo content: sparkle top=75, book bottom=390, content height=315.
       Center of content = (75+390)/2 = 232.5. Shift down by 23.5 to center in 256.
       Using translate(0,23) gives top padding = 98, bottom padding = 99 — perfectly balanced. -->
  <g transform="translate(0, 23)">
    <!-- Network / Citation Graph (Semantic connections behind the book) -->
    <g opacity="0.6">
      <!-- Graph Edge Connections -->
      <line x1="256" y1="140" x2="160" y2="250" stroke="white" stroke-width="4" stroke-dasharray="6 6" />
      <line x1="256" y1="140" x2="352" y2="250" stroke="white" stroke-width="4" stroke-dasharray="6 6" />
      <line x1="160" y1="250" x2="256" y2="340" stroke="white" stroke-width="4" />
      <line x1="352" y1="250" x2="256" y2="340" stroke="white" stroke-width="4" />
      <line x1="160" y1="250" x2="352" y2="250" stroke="white" stroke-width="3" opacity="0.3" />

      <!-- Graph Intersect Nodes -->
      <circle cx="256" cy="140" r="12" fill="white" />
      <circle cx="160" cy="250" r="10" fill="white" />
      <circle cx="352" cy="250" r="10" fill="white" />
      <circle cx="256" cy="340" r="14" fill="white" />
    </g>

    <!-- The Open Book -->
    <!-- Left Page Translucent Backdrop -->
    <path
      d="M 256 385 C 180 385 120 347 120 347 L 120 222 C 120 222 180 257 256 257 Z"
      fill="white"
      opacity="0.1"
    />
    <!-- Left Page Outline -->
    <path
      d="M 256 385 C 180 385 120 347 120 347 L 120 222 C 120 222 180 257 256 257"
      stroke="white"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Right Page Translucent Backdrop -->
    <path
      d="M 256 385 C 332 385 392 347 392 347 L 392 222 C 392 222 332 257 256 257 Z"
      fill="white"
      opacity="0.1"
    />
    <!-- Right Page Outline -->
    <path
      d="M 256 385 C 332 385 392 347 392 347 L 392 222 C 392 222 332 257 256 257"
      stroke="white"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Book Spine Divider -->
    <path
      d="M 256 257 L 256 385"
      stroke="white"
      stroke-width="12"
      stroke-linecap="round"
    />

    <!-- AI Insight Sparkle (Hovering above the book) -->
    <path
      d="M 256 80 L 267 114 L 305 126 L 267 138 L 256 172 L 245 138 L 207 126 L 245 114 Z"
      fill="#70d8c8"
    />
  </g>
</svg>
